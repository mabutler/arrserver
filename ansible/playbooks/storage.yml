---
- name: Configure storage (mergerfs pool + snapraid parity)
  hosts: localhost
  become: true

  tasks:
    - name: Clone mergerfs from AUR
      ansible.builtin.git:
        repo: https://aur.archlinux.org/mergerfs.git
        dest: /tmp/mergerfs-aur
        version: master
      become: false

    - name: Build mergerfs
      ansible.builtin.shell:
        cmd: makepkg -sf --noconfirm
        chdir: /tmp/mergerfs-aur
        creates: /usr/bin/mergerfs
      become: false

    - name: Install mergerfs package
      ansible.builtin.shell:
        cmd: pacman -U --noconfirm /tmp/mergerfs-aur/*.pkg.tar.zst
        creates: /usr/bin/mergerfs

    - name: Clone snapraid from AUR
      ansible.builtin.git:
        repo: https://aur.archlinux.org/snapraid.git
        dest: /tmp/snapraid-aur
        version: master
      become: false

    - name: Build snapraid
      ansible.builtin.shell:
        cmd: makepkg -sf --noconfirm
        chdir: /tmp/snapraid-aur
        creates: /usr/bin/snapraid
      become: false

    - name: Install snapraid package
      ansible.builtin.shell:
        cmd: pacman -U --noconfirm /tmp/snapraid-aur/*.pkg.tar.zst
        creates: /usr/bin/snapraid

    - name: Install fuse3
      community.general.pacman:
        name: fuse3
        state: present

    - name: Create data drive mount points
      ansible.builtin.file:
        path: "{{ item.mount }}"
        state: directory
        mode: "0755"
      loop: "{{ storage_drives }}"

    - name: Create parity drive mount point
      ansible.builtin.file:
        path: "{{ parity_drive.mount }}"
        state: directory
        mode: "0755"

    - name: Mount data drives (fstab)
      ansible.posix.mount:
        path: "{{ item.mount }}"
        src: "UUID={{ item.uuid }}"
        fstype: xfs
        opts: defaults,nofail
        state: mounted
      loop: "{{ storage_drives }}"

    - name: Mount parity drive (fstab)
      ansible.posix.mount:
        path: "{{ parity_drive.mount }}"
        src: "UUID={{ parity_drive.uuid }}"
        fstype: xfs
        opts: defaults,nofail
        state: mounted

    - name: Check if mergerfs is mounted at /data
      ansible.builtin.command: findmnt -t fuse.mergerfs /data
      register: mergerfs_mounted
      changed_when: false
      failed_when: false

    - name: Mount mergerfs pool at /data
      ansible.builtin.shell:
        cmd: >
          mergerfs
          {{ storage_drives | map(attribute='mount') | join(':') }}
          /data
          -o allow_other,category.create=mfs,moveonenospc=1
      when: mergerfs_mounted.rc != 0

    - name: Deploy mergerfs systemd service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/mergerfs.service.j2"
        dest: /etc/systemd/system/mergerfs.service
        mode: "0644"
      notify: Reload systemd

    - name: Enable mergerfs service
      ansible.builtin.systemd:
        name: mergerfs.service
        enabled: true

    - name: Create snapraid content dir
      ansible.builtin.file:
        path: /var/snapraid
        state: directory
        mode: "0755"

    - name: Deploy snapraid config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/snapraid.conf.j2"
        dest: /etc/snapraid.conf
        mode: "0644"

    - name: Deploy snapraid sync systemd service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/snapraid-sync.service.j2"
        dest: /etc/systemd/system/snapraid-sync.service
        mode: "0644"
      notify: Reload systemd

    - name: Deploy snapraid sync systemd timer
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/snapraid-sync.timer.j2"
        dest: /etc/systemd/system/snapraid-sync.timer
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start snapraid sync timer
      ansible.builtin.systemd:
        name: snapraid-sync.timer
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
