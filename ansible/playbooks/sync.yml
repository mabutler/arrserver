---
- name: Configure file sync with remote download server
  hosts: localhost
  become: true
  vars_files:
    - ../../secrets.yml

  tasks:
    - name: Install sshpass (needed for initial key installation)
      community.general.pacman:
        name: sshpass
        state: present

    - name: Generate SSH keypair for sync
      community.crypto.openssh_keypair:
        path: "{{ sync_ssh_key_path }}"
        type: ed25519
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0600"
      become_user: "{{ server_user }}"

    - name: Add remote host to known_hosts
      ansible.builtin.known_hosts:
        name: "{{ sync_remote_host }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -H ' + sync_remote_host) }}"
        path: "/home/{{ server_user }}/.ssh/known_hosts"
        state: present

    - name: Install SSH public key on remote server
      ansible.builtin.command:
        cmd: >
          sshpass -p "{{ sync_remote_password }}"
          ssh-copy-id
          -i {{ sync_ssh_key_path }}.pub
          -o StrictHostKeyChecking=yes
          {{ sync_remote_user }}@{{ sync_remote_host }}
      become_user: "{{ server_user }}"
      register: ssh_copy_result
      changed_when: "'added' in ssh_copy_result.stdout"
      failed_when: ssh_copy_result.rc != 0 and 'already' not in ssh_copy_result.stdout

    - name: Deploy torrent-push systemd service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/torrent-push.service.j2"
        dest: /etc/systemd/system/torrent-push.service
        mode: "0644"
      notify: Reload systemd

    - name: Deploy torrent-push systemd timer
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/torrent-push.timer.j2"
        dest: /etc/systemd/system/torrent-push.timer
        mode: "0644"
      notify: Reload systemd

    - name: Deploy download-pull systemd service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/download-pull.service.j2"
        dest: /etc/systemd/system/download-pull.service
        mode: "0644"
      notify: Reload systemd

    - name: Deploy download-pull systemd timer
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/download-pull.timer.j2"
        dest: /etc/systemd/system/download-pull.timer
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start sync timers
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - torrent-push.timer
        - download-pull.timer

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
