---
- name: Configure file sync with remote download server
  hosts: localhost
  become: true

  tasks:
    - name: Verify SSH key exists
      ansible.builtin.stat:
        path: "{{ sync_ssh_key_path }}"
      register: ssh_key
      failed_when: not ssh_key.stat.exists
      become: false

    - name: Add remote host to known_hosts
      ansible.builtin.known_hosts:
        name: "{{ sync_remote_host }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -H ' + sync_remote_host) }}"
        path: "/home/{{ server_user }}/.ssh/known_hosts"
        state: present

    - name: Verify SSH connection to remote
      ansible.builtin.command:
        cmd: >
          ssh -i {{ sync_ssh_key_path }}
          -o StrictHostKeyChecking=yes
          -o BatchMode=yes
          {{ sync_remote_user }}@{{ sync_remote_host }}
          echo ok
      become_user: "{{ server_user }}"
      changed_when: false

    - name: Deploy download-pull systemd service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/download-pull.service.j2"
        dest: /etc/systemd/system/download-pull.service
        mode: "0644"
      notify: Reload systemd

    - name: Deploy download-pull systemd timer
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/download-pull.timer.j2"
        dest: /etc/systemd/system/download-pull.timer
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start download-pull timer
      ansible.builtin.systemd:
        name: download-pull.timer
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
