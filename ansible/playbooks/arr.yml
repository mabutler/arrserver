---
- name: Deploy arr stack
  hosts: localhost
  become: true

  tasks:
    - name: Install Docker Compose plugin
      community.general.pacman:
        name: docker-compose
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Create arr config directories
      file:
        path: "/opt/arrconfig/{{ item }}"
        state: directory
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0755"
      loop:
        - sonarr
        - radarr
        - prowlarr
        - homarr

    - name: Copy config templates (skip if config already exists)
      copy:
        src: "{{ playbook_dir }}/../../config-templates/{{ item }}/config.xml"
        dest: "/opt/arrconfig/{{ item }}/config.xml"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0644"
        force: false
      loop:
        - sonarr
        - radarr
        - prowlarr

    - name: Start arr stack
      community.docker.docker_compose_v2:
        project_src: /opt/arrserver/docker
        state: present
