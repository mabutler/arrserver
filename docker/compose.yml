services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/arrconfig/sonarr:/config
      - /data/media:/data/media
      - /data/downloads:/data/downloads
    ports:
      - 8989:8989
    networks:
      - arr-net
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/arrconfig/radarr:/config
      - /data/media:/data/media
      - /data/downloads:/data/downloads
    ports:
      - 7878:7878
    networks:
      - arr-net
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/arrconfig/prowlarr:/config
    ports:
      - 9696:9696
    networks:
      - arr-net
    restart: unless-stopped

networks:
  arr-net:
    driver: bridge
